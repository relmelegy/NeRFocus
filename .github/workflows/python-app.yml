name: NeRFocus CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Show repo files
        run: |
          pwd
          ls -la

      - name: Pick requirements file
        run: |
          if [ -f requirements.txt ]; then
            echo "REQ=requirements.txt" >> $GITHUB_ENV
          elif [ -f requirements.txt.txt ]; then
            echo "REQ=requirements.txt.txt" >> $GITHUB_ENV
          else
            echo "No requirements file found"
            exit 1
          fi

      - name: Install older packaging tools
        run: |
          python -m pip install "pip<24" "setuptools<60" "wheel<0.38"

      - name: Install NumPy first
        run: |
          python -m pip install --no-build-isolation "numpy==1.18.5"

      - name: Install remaining dependencies
        run: |
          python - <<'PY'
          import os, re
          req = os.environ["REQ"]
          skip = {"numpy"}
          out = []
          with open(req) as f:
              for line in f:
                  s = line.strip()
                  if not s or s.startswith("#"):
                      continue
                  pkg = re.split(r"[<>=!~]", s)[0].strip()
                  if pkg not in skip:
                      out.append(s)
          with open("filtered_requirements.txt", "w") as f:
              f.write("\n".join(out) + ("\n" if out else ""))
          print(open("filtered_requirements.txt").read())
          PY
          python -m pip install --no-build-isolation -r filtered_requirements.txt

      - name: Smoke test imports
        run: |
          python - <<'PY'
          import numpy
          print("numpy:", numpy.__version__)
          PY

      - name: Show train help
        run: |
          python train.py --help || true
